<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Material Desktop</title>
    <link rel="stylesheet" href="./shared/css/common.css" />
    <style>
      .landing-index {
        position: relative;
        z-index: 1;
        max-width: 520px;
        padding: 28px 28px 32px;
        margin: 0;
        color: rgba(18, 32, 52, 0.92);
        text-shadow: 0 1px 0 rgba(255, 255, 255, 0.35);
      }
      .landing-index h1 {
        margin: 0 0 12px;
        font-weight: 700;
        letter-spacing: 0.02em;
      }
      .landing-index p {
        margin: 0 0 14px;
        line-height: 1.45;
      }
      .landing-index ul {
        margin: 0;
        padding-left: 1.2em;
      }
      .landing-index a {
        color: rgba(0, 90, 160, 0.95);
        font-weight: 600;
      }
      .landing-index a:hover {
        color: rgba(0, 60, 130, 0.98);
      }
    </style>
  </head>
  <body>
    <main class="viewport">
      <div
        class="material-base"
        style="background-image: url('./assets/desktopbackgrounddigital.jpg')"
        aria-hidden="true"
      ></div>
      <div class="landing-index">
        <h1>Material Desktop</h1>
        <p>Choose a view:</p>
        <ul>
          <li><a href="./desktop/">Desktop</a></li>
          <li><a href="./mobile/">Mobile</a></li>
        </ul>
      </div>
    </main>
  </body>
</html>
