<!doctype html>
<html lang="en" data-view="desktop">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Material Desktop (Desktop)</title>
    <link rel="stylesheet" href="../shared/css/common.css" />
  </head>
  <body>
    <main class="viewport viewport--desktop viewport--bg-landscape">
      <div id="material-base" class="material-base">
        <div class="material-placeholder"></div>
      </div>

      <div id="window-layer" class="window-layer" aria-label="Desktop windows"></div>

      <button id="desktop-code-icon" class="desktop-app-icon" type="button" aria-label="Open code editor window">
        <span class="desktop-app-icon__glyph" aria-hidden="true">⌘</span>
        <span class="desktop-app-icon__label">Editor</span>
      </button>

      <footer class="start-bar" aria-label="Start bar">
        <button id="desktop-start-btn" class="start-bar__start" type="button">Start</button>
        <div class="start-bar__spacer" aria-hidden="true"></div>
        <time class="start-bar__clock" datetime="" aria-live="polite">—:—</time>
      </footer>

      <div
        id="desktop-entry-overlay"
        class="desktop-entry-overlay"
        role="dialog"
        aria-modal="true"
        aria-labelledby="desktop-entry-title"
        aria-describedby="desktop-entry-hint"
      >
        <div class="desktop-entry-overlay__card">
          <p id="desktop-entry-title" class="desktop-entry-overlay__title">materializing the desktop</p>
          <p id="desktop-entry-hint" class="desktop-entry-overlay__hint">click space to enter</p>
        </div>
      </div>

      <div class="hud" aria-hidden="true">
        <div class="hud__title">Material Desktop</div>
        <div class="hud__sub">Desktop windows placeholder</div>
      </div>
    </main>

    <script type="module" src="../shared/js/overlay.js"></script>
  </body>
</html>
