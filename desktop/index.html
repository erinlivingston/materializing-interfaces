<!doctype html>
<html lang="en" data-view="desktop">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Material Desktop (Desktop)</title>
    <link rel="stylesheet" href="../shared/css/common.css" />
  </head>
  <body>
    <main class="viewport viewport--desktop">
      <div
        id="material-base"
        class="material-base"
        data-base-src="../assets/base-image.jpg"
      >
        <div class="material-placeholder"></div>
      </div>

      <div id="window-layer" class="window-layer" aria-label="Desktop windows"></div>

      <div class="hud" aria-hidden="true">
        <div class="hud__title">Material Desktop</div>
        <div class="hud__sub">Desktop windows placeholder</div>
      </div>
    </main>

    <script type="module" src="../shared/js/overlay.js"></script>
  </body>
</html>
